<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>深夜的棉花糖 — 故事预览</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, "Microsoft YaHei", sans-serif; background: #1a1a2e; color: #e0e0e0; min-height: 100vh; }
  
  /* Tabs */
  .tabs { display: flex; background: #16213e; border-bottom: 2px solid #0f3460; position: sticky; top: 0; z-index: 100; }
  .tab { padding: 12px 24px; cursor: pointer; border: none; background: transparent; color: #e0e0e0; font-size: 15px; opacity: 0.6; transition: all 0.3s; }
  .tab.active { opacity: 1; border-bottom: 3px solid #e94560; font-weight: bold; }
  .tab:hover { opacity: 0.9; }
  
  /* Tab panels */
  .panel { display: none; padding: 20px; }
  .panel.active { display: block; }
  
  /* Slideshow */
  .slideshow { max-width: 480px; margin: 0 auto; text-align: center; }
  .slide { display: none; }
  .slide.active { display: block; }
  .slide img { width: 100%; border-radius: 12px; border: 3px solid #e94560; }

  /* Ken Burns container for static shots */
  .ken-burns-container { position: relative; width: 100%; border-radius: 12px; overflow: hidden; border: 3px solid #e94560; aspect-ratio: 9/16; }
  .ken-burns-container img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; animation: kenBurnsZoom 6s ease-in-out forwards; }
  @keyframes kenBurnsZoom { 0% { transform: scale(1) translate(0,0); } 50% { transform: scale(1.08) translate(-1%,-1%); } 100% { transform: scale(1.12) translate(1%,0); } }
  @keyframes kenBurnsPan { 0% { transform: scale(1.1) translate(-2%,0); } 100% { transform: scale(1.1) translate(2%,0); } }

  /* Shot type badge */
  .shot-type-badge { display: inline-block; padding: 2px 8px; border-radius: 6px; font-size: 11px; font-weight: bold; margin-left: 6px; vertical-align: middle; }
  .shot-type-badge.dynamic { background: #e94560; color: #fff; }
  .shot-type-badge.static { background: #4a90d9; color: #fff; }
  .shot-type-badge.lipSync { background: #f0c040; color: #333; }

  /* LipSync placeholder */
  .lipsync-overlay { position: absolute; bottom: 8px; right: 8px; background: rgba(0,0,0,0.6); color: #f0c040; padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: bold; }

  .slide-nav { display: flex; justify-content: center; align-items: center; gap: 16px; margin-top: 16px; }
  .slide-nav button { background: #e94560; color: #fff; border: none; border-radius: 50%; width: 48px; height: 48px; font-size: 20px; cursor: pointer; }
  .slide-counter { color: #e0e0e0; opacity: 0.7; font-size: 14px; }
  .subtitle-box { background: rgba(0,0,0,0.7); border-radius: 12px; padding: 16px; margin-top: 12px; border: 2px solid #e94560; position: relative; }
  .subtitle-box::before { content: ''; position: absolute; bottom: -10px; left: 30px; width: 0; border-left: 10px solid transparent; border-right: 10px solid transparent; border-top: 10px solid #e94560; }
  .subtitle-text { font-size: 18px; line-height: 1.6; }
  .speaker-tag { display: inline-block; background: #e94560; color: #fff; padding: 2px 10px; border-radius: 10px; font-size: 12px; margin-bottom: 8px; }
  
  /* Details table */
  .detail-table { width: 100%; border-collapse: collapse; font-size: 14px; }
  .detail-table th, .detail-table td { padding: 10px 12px; border: 1px solid #0f3460; text-align: left; vertical-align: top; }
  .detail-table th { background: #16213e; font-weight: bold; position: sticky; top: 0; }
  .detail-table img { width: 80px; height: auto; border-radius: 6px; }
  .prompt-text { font-size: 12px; opacity: 0.8; max-width: 300px; word-break: break-all; }
  
  /* Video tasks */
  .task-card { background: #16213e; border-radius: 8px; padding: 16px; margin-bottom: 12px; border-left: 4px solid #e94560; }
  .task-header { font-weight: bold; margin-bottom: 8px; }
  .task-prompt { font-size: 13px; opacity: 0.8; }
  .task-meta { font-size: 12px; opacity: 0.6; margin-top: 6px; }
  .approve-btn { display: block; margin: 20px auto; padding: 12px 32px; background: #e94560; color: #fff; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; }
  .approve-btn:hover { opacity: 0.9; }
  
  /* Responsive */
  @media (max-width: 600px) {
    .tab { padding: 10px 14px; font-size: 13px; }
    .panel { padding: 12px; }
    .detail-table { font-size: 12px; }
    .detail-table img { width: 50px; }
  }
</style>
</head>
<body>

<div class="tabs">
  <button class="tab active" onclick="switchTab('preview')">🎬 故事预览</button>
  <button class="tab" onclick="switchTab('details')">📋 分镜详情</button>
  <button class="tab" onclick="switchTab('tasks')">🎥 视频任务</button>
</div>

<!-- Tab 1: Story Preview -->
<div class="panel active" id="panel-preview">
  <div class="slideshow" id="slideshow"></div>
</div>

<!-- Tab 2: Shot Details -->
<div class="panel" id="panel-details">
  <table class="detail-table">
    <thead>
      <tr><th>#</th><th>类型</th><th>首帧</th><th>字幕</th><th>imagePrompt</th><th>videoPrompt</th></tr>
    </thead>
    <tbody id="details-tbody"></tbody>
  </table>
</div>

<!-- Tab 3: Video Tasks -->
<div class="panel" id="panel-tasks">
  <div id="tasks-container"></div>
</div>

<script>
const shots = [{"id":"shot_1","shotType":"static","image":"","lastFrame":"","audio":"","subtitle":"城市睡了，但总有一盏灯为你亮着。","speaker":"旁白","duration":5,"imagePrompt":"深夜街道，一家亮着暖黄灯光的咖啡馆，窗外有落叶，街景空旷，漫画风格","lastFramePrompt":"","videoPrompt":""},{"id":"shot_2","shotType":"dynamic","image":"","lastFrame":"","audio":"","subtitle":"","speaker":"","duration":4,"imagePrompt":"小夏推开咖啡馆的门，肩膀下垂神情疲惫，背着沉重的电脑包，漫画风格","lastFramePrompt":"小夏走到吧台前，把电脑包放在桌上，漫画风格","videoPrompt":"小夏推门进入带进冷风，走到吧台前卸下电脑包"},{"id":"shot_3","shotType":"lipSync","image":"","lastFrame":"","audio":"","subtitle":"还是老样子？热可可，多加棉花糖。","speaker":"c2","duration":4,"imagePrompt":"老陈面部特写，眼角有皱纹，眼神温和慈祥，穿着旧围裙，漫画风格","lastFramePrompt":"","videoPrompt":""},{"id":"shot_4","shotType":"dynamic","image":"","lastFrame":"","audio":"","subtitle":"","speaker":"","duration":5,"imagePrompt":"咖啡机蒸汽喷出，老陈的手正在搅拌热可可，白色棉花糖堆在杯顶，漫画风格","lastFramePrompt":"一杯完美的热可可放在吧台上，棉花糖微微融化，漫画风格","videoPrompt":"老陈制作热可可，咖啡机蒸汽喷出，棉花糖慢慢融化"},{"id":"shot_5","shotType":"static","image":"","lastFrame":"","audio":"","subtitle":"小夏看着杯中的棉花糖，嘴角微微上扬。","speaker":"旁白","duration":5,"imagePrompt":"小夏双手捧着热可可，眼眶微红，棉花糖冒着热气，暖光映在脸上，漫画风格","lastFramePrompt":"","videoPrompt":""},{"id":"shot_6","shotType":"static","image":"","lastFrame":"","audio":"","subtitle":"雨停了。明天，也是新的一天。","speaker":"旁白","duration":5,"imagePrompt":"窗外雨停了，街道上积水倒映着路灯，咖啡馆灯光温暖，远景，漫画风格","lastFramePrompt":"","videoPrompt":""}];
const videoTasks = [
  {
    "shotId": "shot_2",
    "prompt": "小夏推门进入带进冷风，走到吧台前卸下电脑包",
    "firstFramePath": "episodes/ep_20260408_深夜咖啡馆的秘密/images/shot_2_first.png",
    "lastFramePath": "episodes/ep_20260408_深夜咖啡馆的秘密/images/shot_2_last.png",
    "ambienceSegmentPath": "episodes/ep_20260408_深夜咖啡馆的秘密/images/ambience_default_shot_2.wav",
    "ratio": "4:3",
    "duration": 4,
    "status": "pending"
  },
  {
    "shotId": "shot_4",
    "prompt": "老陈制作热可可，咖啡机蒸汽喷出，棉花糖慢慢融化",
    "firstFramePath": "episodes/ep_20260408_深夜咖啡馆的秘密/images/shot_4_first.png",
    "lastFramePath": "episodes/ep_20260408_深夜咖啡馆的秘密/images/shot_4_last.png",
    "ambienceSegmentPath": "episodes/ep_20260408_深夜咖啡馆的秘密/images/ambience_default_shot_4.wav",
    "ratio": "4:3",
    "duration": 5,
    "status": "pending"
  }
];
let currentSlide = 0;

// Build slideshow
function buildSlideshow() {
  const container = document.getElementById('slideshow');
  shots.forEach((s, i) => {
    const div = document.createElement('div');
    div.className = 'slide' + (i === 0 ? ' active' : '');

    // Build image section based on shotType
    let imageHtml;
    const typeLabel = s.shotType === 'static' ? '📷 静态' : s.shotType === 'lipSync' ? '🗣️ 对口型' : '🎬 动态';

    if (s.shotType === 'static') {
      // Static shot: Ken Burns effect
      imageHtml = `
        <div class="ken-burns-container">
          <img src="${s.image}" alt="Shot ${s.id}" onerror="this.style.display='none'">
        </div>
      `;
    } else if (s.shotType === 'lipSync') {
      // LipSync: image with placeholder overlay
      imageHtml = `
        <div style="position:relative;display:inline-block;width:100%;">
          <img src="${s.image}" alt="Shot ${s.id}" style="width:100%;border-radius:12px;border:3px solid #e94560;" onerror="this.style.display='none'">
          <div class="lipsync-overlay">⏳ 待对口型处理</div>
        </div>
      `;
    } else {
      // Dynamic: normal image (will be replaced by video when available)
      imageHtml = `
        <img src="${s.image}" alt="Shot ${s.id}" onerror="this.style.display='none'">
      `;
    }

    div.innerHTML = `
      ${imageHtml}
      <div class="slide-nav">
        <button onclick="prevSlide()">◀</button>
        <span class="slide-counter">${i + 1} / ${shots.length} <span class="shot-type-badge ${s.shotType}">${typeLabel}</span></span>
        <button onclick="nextSlide()">▶</button>
      </div>
      <div class="subtitle-box">
        <div class="speaker-tag">${s.speaker}</div>
        <div class="subtitle-text">${s.subtitle}</div>
      </div>
    `;
    container.appendChild(div);
  });
}

// Build details table
function buildDetails() {
  const tbody = document.getElementById('details-tbody');
  shots.forEach((s, i) => {
    const typeLabel = s.shotType === 'static' ? '📷 静态' : s.shotType === 'lipSync' ? '🗣️ 对口型' : '🎬 动态';
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${i + 1}</td>
      <td><span class="shot-type-badge ${s.shotType}">${typeLabel}</span></td>
      <td><img src="${s.image}" alt="${s.id}"></td>
      <td>${s.subtitle}</td>
      <td class="prompt-text">${s.imagePrompt}</td>
      <td class="prompt-text">${s.videoPrompt}</td>
    `;
    tbody.appendChild(tr);
  });
}

// Build video tasks
function buildTasks() {
  const container = document.getElementById('tasks-container');
  if (!videoTasks.length) {
    container.innerHTML = '<p style="opacity:0.6">暂无视频任务</p>';
    return;
  }
  videoTasks.forEach(t => {
    const div = document.createElement('div');
    div.className = 'task-card';
    div.innerHTML = `
      <div class="task-header">镜头 ${t.shotId} — ${t.status}</div>
      <div class="task-prompt">${t.prompt}</div>
      <div class="task-meta">比例: ${t.ratio} | 时长: ${t.duration}s | 首帧: ${t.firstFramePath}</div>
    `;
    container.appendChild(div);
  });
  const btn = document.createElement('button');
  btn.className = 'approve-btn';
  btn.textContent = '✅ 审核通过，开始生成视频';
  container.appendChild(btn);
}

function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('panel-' + name).classList.add('active');
}

function showSlide(n) {
  const slides = document.querySelectorAll('.slide');
  slides.forEach(s => s.classList.remove('active'));
  currentSlide = ((n % slides.length) + slides.length) % slides.length;
  slides[currentSlide].classList.add('active');
  // Auto-play audio
  shots.forEach(s => {
    if (s.audio) {
      const audio = new Audio(s.audio);
      audio.pause();
    }
  });
  if (shots[currentSlide].audio) {
    new Audio(shots[currentSlide].audio).play().catch(() => {});
  }
}

function prevSlide() { showSlide(currentSlide - 1); }
function nextSlide() { showSlide(currentSlide + 1); }

// Keyboard navigation
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft') prevSlide();
  if (e.key === 'ArrowRight') nextSlide();
});

buildSlideshow();
buildDetails();
buildTasks();
</script>
</body>
</html>
